<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hairy Subjects</title>
  <style>
    @font-face {
      font-family: 'Minion Pro';
      src: url('../fonts/MinionPro-Regular.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'Minion Pro';
      src: url('../fonts/MinionPro-It.otf') format('opentype');
      font-weight: normal;
      font-style: italic;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: white;
      cursor: default;
    }

    #quote {
      position: absolute;
      top: 66%;
      left: 15%;
      width: 33%;
      padding: 30px;
      font-family: 'Minion Pro', serif;
      font-size: 18px;
      line-height: 1.6;
      color: #5cfaa6;
      cursor: pointer;
      text-decoration: none;
    }

    #quote .spanish {
      font-style: italic;
    }

    #quote .english {
      margin-top: 12px;
      padding-left: 40px;
    }
    #elastics {
      position: absolute;
      top: 80px;
      right: 100px;
      width: 400px;
    }

    #broom {
      position: absolute;
      top: 40%;
      left: 40%;
      width: 300px;
    }

    .draggable {
      position: absolute;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      z-index: 9999;
    }

    .draggable:active {
      cursor: grabbing;
    }

    .draggable img {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>

  <a href="../pair3/"><img id="elastics" src="assets/elastics.png" alt="elastics"></a>

  <a href="../pair1/"><img id="broom" src="assets/broom.png" alt="broom"></a>

  <a id="quote" href="../pair2/">
    <div class="spanish">Mira que si te quise, fué por el pelo, Ahora que estás pelona, ya no te quiero</div>
    <div class="english">[Look, if I loved you, it was for your hair, Now that you're bald, I don't love you anymore]</div>
  </a>

  <script>
    const pieces = [
      { src: 'assets/Image8.png',  w: 620, x: -90,  y: -70,  r: -7 },
      { src: 'assets/Image9.png',  w: 380, x: 400,  y: -30,  r: 12 },
      { src: 'assets/Image10.png', w: 550, x: 700,  y: -90,  r: -2 },
      { src: 'assets/Image11.png', w: 420, x: 1150, y: -20,  r: 8 },
      { src: 'assets/image13.png', w: 350, x: 1450, y: 30,   r: -11 },
      { src: 'assets/Image12.png', w: 580, x: 30,   y: 180,  r: 9 },
      { src: 'assets/Image8.png',  w: 330, x: 520,  y: 150,  r: -15 },
      { src: 'assets/Image9.png',  w: 600, x: 780,  y: 130,  r: 4 },
      { src: 'assets/Image11.png', w: 400, x: 1280, y: 200,  r: -8 },
      { src: 'assets/Image10.png', w: 550, x: -60,  y: 400,  r: -5 },
      { src: 'assets/image13.png', w: 650, x: 350,  y: 350,  r: 6 },
      { src: 'assets/Image12.png', w: 370, x: 880,  y: 420,  r: -13 },
      { src: 'assets/Image8.png',  w: 520, x: 1150, y: 370,  r: 10 },
      { src: 'assets/Image9.png',  w: 430, x: 1500, y: 350,  r: -4 },
      { src: 'assets/Image11.png', w: 580, x: -40,  y: 620,  r: 7 },
      { src: 'assets/Image10.png', w: 350, x: 450,  y: 660,  r: -12 },
      { src: 'assets/Image12.png', w: 600, x: 700,  y: 600,  r: 3 },
      { src: 'assets/image13.png', w: 420, x: 1180, y: 640,  r: -9 },
      { src: 'assets/Image8.png',  w: 550, x: 1450, y: 590,  r: 6 },
      { src: 'assets/Image9.png',  w: 480, x: 100,  y: 830,  r: -8 },
      { src: 'assets/Image11.png', w: 620, x: 500,  y: 800,  r: 5 },
      { src: 'assets/Image10.png', w: 400, x: 1000, y: 850,  r: -14 },
      { src: 'assets/Image12.png', w: 550, x: 1320, y: 810,  r: 7 },
      // image14 - single instance
      { src: 'assets/image14.png', w: 500, x: 600,  y: 400,  r: 0 },
    ];

    pieces.forEach(p => {
      const div = document.createElement('div');
      div.className = 'draggable';
      const img = document.createElement('img');
      img.src = p.src;
      img.draggable = false;
      div.appendChild(img);
      div.style.width = p.w + 'px';
      div.style.left = p.x + 'px';
      div.style.top = p.y + 'px';
      div.style.transform = 'rotate(' + p.r + 'deg)';
      document.body.appendChild(div);
    });

    // drag logic
    let dragEl = null;
    let offsetX = 0;
    let offsetY = 0;
    let topZ = 10000;

    document.addEventListener('pointerdown', (e) => {
      const el = e.target.closest('.draggable');
      if (!el) return;
      dragEl = el;
      const rect = el.getBoundingClientRect();
      offsetX = e.clientX - rect.left;
      offsetY = e.clientY - rect.top;
      dragEl.style.zIndex = ++topZ;
      dragEl.setPointerCapture(e.pointerId);
    });

    document.addEventListener('pointermove', (e) => {
      if (!dragEl) return;
      dragEl.style.left = (e.clientX - offsetX) + 'px';
      dragEl.style.top = (e.clientY - offsetY) + 'px';
    });

    document.addEventListener('pointerup', () => {
      dragEl = null;
    });
  </script>

</body>
</html>
